<!-- CTA / Contato Section -->
<section id="contato" class="py-24 md:py-32 bg-white">
    <div class="max-w-4xl mx-auto px-6">
        <!-- Content -->
        <div class="bg-blush-50 rounded-[2rem] p-10 md:p-16 text-center relative overflow-hidden">
            <!-- Decorative -->
            <div class="absolute top-0 right-0 w-40 h-40 bg-blush-100 rounded-full opacity-50 -translate-y-1/2 translate-x-1/2"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-sage-100 rounded-full opacity-30 translate-y-1/2 -translate-x-1/2"></div>

            <div class="relative z-10">
                <span class="text-xs font-sans font-medium tracking-[0.3em] uppercase text-blush-400 block mb-4">Contato</span>
                <h2 class="font-serif text-3xl md:text-4xl font-light text-texto-900 mb-4">
                    Vamos começar essa <span class="italic text-blush-400">jornada</span>?
                </h2>
                <p class="text-texto-500 text-base leading-relaxed max-w-lg mx-auto mb-10">
                    O primeiro passo é sempre o mais importante. Entre em contato
                    e agende sua primeira sessão. Será um prazer te acolher.
                </p>

                <!-- Contact buttons -->
                <div class="flex flex-col sm:flex-row gap-4 justify-center mb-10">
                    <a href="https://wa.me/55{{ site.data.geral.telefone_so_numeros }}?text={{ site.data.geral.texto_whats | url_encode }}"
                       target="_blank"
                       class="inline-flex items-center justify-center gap-2 bg-blush-200 hover:bg-blush-300 text-texto-700 font-medium px-8 py-3.5 rounded-full transition-all duration-300 hover:shadow-lg hover:shadow-blush-200/50">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        WhatsApp
                    </a>

                    <a href="https://www.instagram.com/{{ site.data.geral.instagram }}/"
                       target="_blank"
                       class="inline-flex items-center justify-center gap-2 text-texto-500 hover:text-texto-700 font-medium px-8 py-3.5 rounded-full border border-warm-300 hover:border-blush-200 transition-all duration-300">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                        Instagram
                    </a>

                    <a href="mailto:{{ site.data.geral.email }}?subject={{ site.data.geral.email_assunto }}&body={{ site.data.geral.email_corpo }}"
                       class="inline-flex items-center justify-center gap-2 text-texto-500 hover:text-texto-700 font-medium px-8 py-3.5 rounded-full border border-warm-300 hover:border-blush-200 transition-all duration-300">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        E-mail
                    </a>
                </div>

                <!-- Contact info -->
                <div class="flex flex-col sm:flex-row gap-6 justify-center text-sm text-texto-500">
                    <span class="flex items-center justify-center gap-2">
                        <svg class="w-4 h-4 text-texto-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                        {{ site.data.geral.telefone }}
                    </span>
                    <span class="flex items-center justify-center gap-2">
                        <svg class="w-4 h-4 text-texto-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        {{ site.data.geral.email }}
                    </span>
                </div>
            </div>
        </div>
    </div>
</section>
