title: Isis Couto Psicóloga
email: psi@isiscouto.com.br
source: .
destination: ./public
baseurl: ""
url: https://isiscouto.com.br
lang: pt-BR
locale: pt_BR
author: Isis Couto
description: >-
  Psicóloga clínica em Cachoeirinha e região metropolitana de Porto Alegre.
  Atendimento presencial e online para adolescentes e adultos.
  Clínica Entre Afetos — acolhimento, ética e cuidado humanizado. CRP 07/34586.

# SEO / Social
social:
  name: Isis Couto
  links:
    - https://www.instagram.com/psicologaisiscouto/
    - https://www.instagram.com/clinica.entreafetos/
logo: /assets/image/logo/passaro.png

# OG defaults
defaults:
  - scope:
      path: ""
    values:
      image: /assets/image/isis-couto.jpg

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - docker
  - .github
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - node_modules
  - vendor/
  - .idea
  - .sass-cache
  - makefile
