- paragrafo: >
    Isis Couto, psicóloga clínica e organizacional, gaúcha nascida em Porto Alegre.
    Formada em Psicologia e pós-graduada em Psicologia Social, acredita que o sujeito
    não existe isolado — somos corpo, mente, história, relações e contexto.

- paragrafo: >
    Fundadora da Clínica Entre Afetos, localizada no Centro de Cachoeirinha/RS,
    um espaço pensado com afeto, ética e profissionalismo, onde a escuta é levada a sério.
    Hoje a clínica conta com uma equipe de psicólogos e nutricionistas comprometidos
    com um cuidado humanizado, acessível e empático.

- paragrafo: >
    Acredita profundamente que o cuidado acontece no encontro, na empatia, no afeto.
    Não basta ter técnica, se não houver vínculo. Saúde mental não pode ser privilégio
    — precisa ser direito.
