nome: Entre Afetos
subtitulo: Clínica de Psicologia & Nutrição
instagram: clinica.entreafetos
descricao: >
  A Clínica Entre Afetos nasceu do desejo de criar um espaço onde as pessoas possam
  existir sem precisar se explicar o tempo todo. Onde o sofrimento seja escutado com
  respeito e sem pressa. Entre Afetos fala do que acontece no entre: entre pessoas,
  entre histórias, entre silêncios, entre dor e possibilidades.
endereco: Centro de Cachoeirinha, RS
valores:
  - titulo: Acolhimento
    descricao: Um espaço onde o cuidado acontece no encontro, na empatia, no afeto.
  - titulo: Ética
    descricao: Compromisso com uma prática humana, responsável e socialmente comprometida.
  - titulo: Acessibilidade
    descricao: Saúde mental não pode ser privilégio — precisa ser direito.
