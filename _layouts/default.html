    <!-- Tailwind CSS (local) -->
    <script src="{{ site.baseurl }}/assets/js/tailwind.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blush:   { 50: '#FDF8F6', 100: '#F2E0D9', 200: '#E8C4B8', 300: '#D4A39A', 400: '#C4897E', 500: '#B57068' },
                        sage:    { 50: '#F4F6F4', 100: '#E3E8E4', 200: '#C5CFC6', 300: '#A8B5A3', 400: '#8A9B84', 500: '#6E8268' },
                        warm:    { 50: '#FDFCFB', 100: '#F9F5F2', 200: '#F0EAE4', 300: '#E5DCD4', 400: '#D4C8BC' },
                        gold:    { 400: '#C9A96E', 500: '#B8944F' },
                        texto:   { 900: '#2D2926', 700: '#4A3F3A', 500: '#6B5E57', 300: '#9A8E87' },
                    },
                    fontFamily: {
                        'serif':  ['"Cormorant Garamond"', 'Georgia', 'serif'],
                        'sans':   ['"Inter"', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>

    <!-- HTTPS redirect (production only) -->
    <script>
        window.location.protocol === 'http:' && !window.location.hostname.match(/^(localhost|127\.0\.0\.1)$/) && (window.location.href = 'https:' + window.location.href.slice(5));
    </script>
